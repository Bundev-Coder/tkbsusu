<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thời Khóa Biểu của Su Su</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Import Maps: React, Framer Motion, Lucide qua ESM -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@11.0.8?external=react,react-dom",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react"
        }
    }
    </script>

    <!-- Babel: biên dịch JSX trên trình duyệt -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <!-- Điểm gắn kết React -->
    <div id="root"></div>

    <!-- Dữ liệu lịch học (plain JS, vào window.*) -->
    <script src="data.js"></script>

    <!-- Components & render (JSX, cần Babel) -->
    <script type="text/babel" data-type="module" src="app.js"></script>
</body>
</html>
